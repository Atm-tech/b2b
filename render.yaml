services:
  - type: web
    name: aapoorti-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w packages/domain && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: aapoorti-db
          property: connectionString
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REQUEST_BODY_LIMIT
        value: 2mb
      - key: MAX_UPLOAD_BYTES
        value: "8388608"

  - type: web
    name: aapoorti-web
    runtime: static
    buildCommand: npm install && npm run build -w packages/domain && npm run build -w apps/web
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: aapoorti-db
    plan: basic-1gb
    databaseName: aapoorti_b2b
    user: aapoorti_app
